name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.127.12.161
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/agendabot
            git pull origin main
            docker exec agendabot-backend-1 npm run migrate
            docker compose -f docker-compose.vps.yml build backend
            docker compose -f docker-compose.vps.yml up -d --no-deps backend
