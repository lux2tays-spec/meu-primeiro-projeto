name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Type-check & test ──────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace=apps/backend --workspace=packages/shared --if-present
      - run: npm test --workspace=apps/backend

  # ── Backend → Railway ──────────────────────────────────────────────────────
  deploy-backend:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/github-action@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}

  # ── Run DB migrations after backend deploy ─────────────────────────────────
  migrate:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --workspace=apps/backend --if-present
      - run: npm run migrate --workspace=apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Admin web → Vercel ─────────────────────────────────────────────────────
  deploy-admin:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=apps/admin-web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/admin-web
          vercel-args: --prod
